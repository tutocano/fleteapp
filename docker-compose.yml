services:
  postgres:
    image: postgres:15-alpine
    container_name: fleteapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flete_user
      POSTGRES_PASSWORD: flete_pass
      POSTGRES_DB: flete_db
    ports:
      - "5432:5432"
    volumes:
      - fleteapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flete_user -d flete_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: fleteapp_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://flete_user:flete_pass@postgres:5432/flete_db
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: fleteapp_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:4173"
    depends_on:
      - backend

volumes:
  fleteapp_pgdata:
